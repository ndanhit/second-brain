<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Brain Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0c; color: #e1e1e6; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-item:hover { background: rgba(255, 255, 255, 0.04); }
        .active-item { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border-left: 3px solid #3b82f6; }
        
        /* Markdown Styling */
        .markdown-content h1 { font-size: 2.75rem; font-weight: 800; margin-bottom: 2rem; color: #fff; letter-spacing: -0.03em; line-height: 1.1; }
        .markdown-content h2 { font-size: 1.5rem; font-weight: 700; margin-top: 3rem; margin-bottom: 1.25rem; color: #fff; border-bottom: 1px solid #1f2937; padding-bottom: 0.75rem; }
        .markdown-content h3 { font-size: 1.1rem; font-weight: 600; margin-top: 2rem; margin-bottom: 0.75rem; color: #3b82f6; }
        .markdown-content p { margin-bottom: 1.5rem; line-height: 1.8; color: #a1a1aa; font-size: 1.05rem; }
        .markdown-content ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1.5rem; color: #a1a1aa; }
        .markdown-content li { margin-bottom: 0.75rem; }
        .markdown-content code { background: #1a1b1e; padding: 0.2rem 0.5rem; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; color: #f472b6; }
        .markdown-content pre { background: #0d0e12; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; overflow-x: auto; border: 1px solid #1f2937; }
        .markdown-content blockquote { border-left: 4px solid #3b82f6; padding-left: 1.5rem; font-style: italic; color: #64748b; margin: 2rem 0; }
        
        /* TOC styling */
        .toc-link { font-size: 0.8rem; color: #6b7280; transition: all 0.2s; display: block; padding: 0.25rem 0; }
        .toc-link:hover { color: #fff; transform: translateX(4px); }
        .toc-active { color: #3b82f6 !important; font-weight: 600; border-left: 2px solid #3b82f6; padding-left: 8px; margin-left: -10px; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }

        .node { stroke: #000; stroke-width: 1.5px; cursor: pointer; transition: filter 0.2s; }
        .node:hover { filter: brightness(1.5); }
        .link { stroke: #333; stroke-opacity: 0.4; }
        .node-label { fill: #999; font-size: 10px; pointer-events: none; }
    </style>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        const Icons = {
            Brain: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-1.48Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-1.48Z"/></svg>,
            File: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>,
            Graph: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
            Edit: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>,
            ChevronRight: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            Link: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
            Database: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
            Search: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Code: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        };

        const GraphView = ({ onSelect }) => {
            const svgRef = useRef();
            const [data, setData] = useState(null);

            useEffect(() => {
                fetch('/api/graph').then(r => r.json()).then(setData);
            }, []);

            useEffect(() => {
                if (!data || !svgRef.current) return;

                const width = svgRef.current.clientWidth || 800;
                const height = svgRef.current.clientHeight || 600;

                d3.select(svgRef.current).selectAll("*").remove();
                const svgElement = d3.select(svgRef.current).append("svg")
                    .attr("width", "100%")
                    .attr("height", "100%")
                    .attr("viewBox", `0 0 ${width} ${height}`)
                    .attr("preserveAspectRatio", "xMidYMid meet");

                const svg = svgElement.append("g");

                const zoom = d3.zoom()
                    .scaleExtent([0.1, 4])
                    .on("zoom", (event) => svg.attr("transform", event.transform));

                svgElement.call(zoom);

                const simulation = d3.forceSimulation(data.nodes)
                    .force("link", d3.forceLink(data.links).id(d => d.id).distance(150))
                    .force("charge", d3.forceManyBody().strength(-500))
                    .force("center", d3.forceCenter(width / 2, height / 2))
                    .force("collision", d3.forceCollide().radius(50));

                // Define arrow marker
                svgElement.append("defs").append("marker")
                    .attr("id", "arrowhead")
                    .attr("viewBox", "-0 -5 10 10")
                    .attr("refX", 20)
                    .attr("refY", 0)
                    .attr("orient", "auto")
                    .attr("markerWidth", 6)
                    .attr("markerHeight", 6)
                    .attr("xoverflow", "visible")
                    .append("svg:path")
                    .attr("d", "M 0,-5 L 10 ,0 L 0,5")
                    .attr("fill", "#475569")
                    .style("stroke", "none");

                const link = svg.append("g")
                    .attr("class", "links")
                    .selectAll("line")
                    .data(data.links)
                    .enter().append("line")
                    .attr("class", "link")
                    .attr("stroke", "#475569")
                    .attr("stroke-width", 1)
                    .attr("stroke-opacity", 0.4)
                    .attr("marker-end", "url(#arrowhead)");

                const node = svg.append("g")
                    .attr("class", "nodes")
                    .selectAll("circle")
                    .data(data.nodes)
                    .enter().append("circle")
                    .attr("class", "node")
                    .attr("r", d => d.group === '1-projects' ? 8 : 5)
                    .attr("fill", d => {
                        if (d.group === '1-projects') return '#3b82f6';
                        if (d.group === '2-areas') return '#10b981';
                        if (d.group === '3-resources') return '#f59e0b';
                        return '#64748b';
                    })
                    .on("click", (e, d) => onSelect({ path: d.id, title: d.title }))
                    .call(d3.drag()
                        .on("start", (e, d) => {
                            if (!e.active) simulation.alphaTarget(0.3).restart();
                            d.fx = d.x; d.fy = d.y;
                        })
                        .on("drag", (e, d) => {
                            d.fx = e.x; d.fy = e.y;
                        })
                        .on("end", (e, d) => {
                            if (!e.active) simulation.alphaTarget(0);
                            d.fx = null; d.fy = null;
                        }));

                const label = svg.append("g")
                    .selectAll("text")
                    .data(data.nodes)
                    .enter().append("text")
                    .attr("class", "node-label")
                    .attr("dy", -10)
                    .attr("text-anchor", "middle")
                    .text(d => d.title)
                    .attr("fill", "#94a3b8");

                simulation.on("tick", () => {
                    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                    node.attr("cx", d => d.x).attr("cy", d => d.y);
                    label.attr("x", d => d.x).attr("y", d => d.y);
                });

            }, [data]);

            return <div className="w-full h-full relative" ref={svgRef}></div>;
        };

        const Category = ({ title, items, currentPath, onDocSelect }) => {
            const [open, setOpen] = useState(true);
            const hasItems = items && (Array.isArray(items) ? items.length > 0 : Object.values(items).some(arr => arr.length > 0));
            if (!hasItems) return null;

            return (
                <div className="mb-4">
                    <div onClick={() => setOpen(!open)} className="px-6 py-2 flex justify-between items-center cursor-pointer text-[10px] font-bold text-slate-500 uppercase tracking-widest hover:text-slate-300">
                        {title}
                        <svg className={`w-3 h-3 transition-transform ${open ? 'rotate-90' : ''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                    {open && (
                        <div className="mt-1">
                            {Array.isArray(items) ? (
                                items.map(f => (
                                    <div key={f.path} onClick={() => onDocSelect(f)} className={`sidebar-item flex items-center gap-3 px-6 py-2 cursor-pointer transition-all border-l-2 ${currentPath === f.path ? 'active-item' : 'border-transparent text-slate-400'}`}>
                                        <Icons.File />
                                        <span className="text-sm truncate">{f.title}</span>
                                    </div>
                                ))
                            ) : (
                                Object.entries(items).map(([sub, subItems]) => subItems.length > 0 && (
                                    <div key={sub} className="mb-2">
                                        <div className="px-8 py-1.5 text-[9px] text-blue-500 font-bold uppercase tracking-wider opacity-60">{sub}</div>
                                        {subItems.map(f => (
                                            <div key={f.path} onClick={() => onDocSelect(f)} className={`sidebar-item flex items-center gap-3 px-8 py-1.5 cursor-pointer transition-all border-l-2 ${currentPath === f.path ? 'active-item' : 'border-transparent text-slate-400'}`}>
                                                <Icons.File />
                                                <span className="text-xs truncate">{f.title}</span>
                                            </div>
                                        ))}
                                    </div>
                                ))
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [nav, setNav] = useState(null);
            const [doc, setDoc] = useState(null);
            const [view, setView] = useState('reader'); // 'reader' or 'graph'
            const [loading, setLoading] = useState(false);
            const [search, setSearch] = useState("");
            const [results, setResults] = useState([]);
            const searchRef = useRef(null);

            useEffect(() => {
                fetch('/api/nav').then(r => r.json()).then(setNav);
                
                // 1. Initial Load from Hash
                const initialPath = window.location.hash.replace('#/', '');
                if (initialPath && initialPath.endsWith('.md')) {
                    selectDoc({ path: initialPath, title: initialPath.split('/').pop() }, false);
                }

                const handleKey = (e) => {
                    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); searchRef.current?.focus(); }
                    if (e.key === 'Escape') { setResults([]); }
                }
                
                // 2. Handle Browser Back/Forward & View Switching
                const handleHashChange = () => {
                    const hash = window.location.hash.replace('#/', '');
                    console.log("Hash Change Detected:", hash);
                    
                    if (hash === 'graph' || hash === 'reader') {
                        setView(hash);
                    } else if (hash && hash.endsWith('.md')) {
                        setView('reader');
                        if (!doc || hash !== doc.path) {
                            selectDoc({ path: hash, title: hash.split('/').pop() }, false);
                        }
                    }
                };

                window.addEventListener('keydown', handleKey);
                window.addEventListener('hashchange', handleHashChange);
                return () => {
                    window.removeEventListener('keydown', handleKey);
                    window.removeEventListener('hashchange', handleHashChange);
                }
            }, [nav]); // Re-run if nav loads to ensure we can match paths if needed

            const selectDoc = (item, updateHash = true) => {
                setLoading(true);
                setView('reader');
                if (updateHash) {
                    window.location.hash = `/${item.path}`;
                }
                fetch(`/api/doc/${item.path}`).then(r => r.json()).then(data => {
                    setDoc({ ...data, path: item.path });
                    setLoading(false);
                });
            };

            const openInCode = () => {
                if (!doc) return;
                fetch(`/api/open/${doc.path}`).then(r => r.json());
            };

            useEffect(() => {
                const handleLink = (e) => {
                    const l = e.target.closest('a');
                    if (!l) return;
                    
                    const href = l.getAttribute('href');
                    if (!href) return;

                    // Case 1: Internal Anchor Link (from TOC or Content)
                    if (href.startsWith('#') && !href.startsWith('#/')) {
                        e.preventDefault();
                        const id = href.substring(1);
                        const element = document.getElementById(id);
                        if (element) {
                            element.scrollIntoView({ behavior: 'smooth' });
                            // Optional: Highlight the temporary target
                            element.classList.add('bg-blue-500/10');
                            setTimeout(() => element.classList.remove('bg-blue-500/10'), 2000);
                        }
                        return;
                    }

                    // Case 2: Markdown File Link
                    if (href.endsWith('.md')) {
                        e.preventDefault();
                        selectDoc({ path: href, title: l.innerText });
                    }
                }
                document.addEventListener('click', handleLink);
                return () => document.removeEventListener('click', handleLink);
            }, [doc]); // Re-bind when doc changes to ensure IDs are present

            return (
                <div className="flex h-screen w-full overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-80 glass flex flex-col z-[100] relative border-r border-white/5">
                        <div className="p-8 pb-4 border-b border-white/5 flex flex-col gap-6 bg-black/40">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-blue-400 flex items-center justify-center shadow-lg shadow-blue-500/30">
                                    <Icons.Brain />
                                </div>
                                <h1 className="text-lg font-extrabold tracking-tighter text-white">Second Brain</h1>
                            </div>
                            <div className="flex p-1 bg-white/10 rounded-lg border border-white/10 relative z-[110]">
                                <a 
                                    href="#/reader"
                                    className={`flex-1 py-2 text-[10px] text-center font-black rounded-md transition-all ${view === 'reader' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}
                                >
                                    READER
                                </a>
                                <a 
                                    href="#/graph"
                                    className={`flex-1 py-2 text-[10px] text-center font-black rounded-md transition-all ${view === 'graph' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}
                                >
                                    GRAPH
                                </a>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto py-6 custom-scrollbar">
                            {nav && Object.entries(nav).map(([cat, items]) => (
                                <Category key={cat} title={cat} items={items} currentPath={doc?.path} onDocSelect={selectDoc} />
                            ))}
                        </div>
                    </aside>

                    {/* Main Area */}
                    <div className="flex-1 flex flex-col relative bg-[#0b0c0f]">
                        <header className="h-20 flex items-center justify-center px-10 border-b border-white/5 z-40 bg-[#0b0c0f]/80 backdrop-blur-xl">
                            <div className="w-full max-w-2xl relative">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"><Icons.Search /></div>
                                <input ref={searchRef} value={search} onChange={(e) => { 
                                    setSearch(e.target.value); 
                                    if(e.target.value.length > 2) fetch(`/api/search?q=${e.target.value}`).then(r => r.json()).then(setResults);
                                    else setResults([]);
                                }} type="text" placeholder="Search knowledge (Cmd + K)..." className="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-sm text-slate-200 placeholder-slate-600" />
                                {results.length > 0 && <div className="absolute top-14 left-0 w-full glass bg-slate-900 border border-slate-800 rounded-xl shadow-2xl overflow-hidden p-2">
                                    {results.map(r => <div key={r.path} onClick={() => { selectDoc(r); setResults([]); setSearch(""); }} className="px-4 py-3 hover:bg-blue-600/10 rounded-lg cursor-pointer group">
                                        <div className="text-sm font-semibold text-slate-200 group-hover:text-blue-400">{r.title}</div>
                                        <div className="text-[10px] text-slate-500 uppercase mt-1 font-bold">{r.path}</div>
                                    </div>)}
                                </div>}
                            </div>
                        </header>

                        <div className="flex-1 overflow-hidden">
                            {view === 'graph' ? (
                                <GraphView onSelect={selectDoc} />
                            ) : (
                                <div className="h-full flex">
                                    {/* Content */}
                                    <div className="flex-1 overflow-y-auto p-12 custom-scrollbar">
                                        {doc ? (
                                            <div className="max-w-4xl mx-auto pb-40">
                                                <div className="flex justify-between items-start mb-10">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 text-[10px] text-slate-500 font-bold tracking-widest uppercase mb-4 opacity-50">
                                                            <span>Second Brain</span> <Icons.ChevronRight /> <span>{doc.path.split('/')[0]}</span>
                                                        </div>
                                                        {/* Only show title if markdown content doesn't start with H1 */}
                                                        {!doc.content.includes('<h1') && (
                                                            <h1 className="text-4xl font-extrabold text-white mb-8">{doc.metadata.title || doc.path.split('/').pop()}</h1>
                                                        )}
                                                    </div>
                                                    <button onClick={openInCode} className="p-3 bg-white/5 hover:bg-blue-600/20 text-slate-400 hover:text-blue-400 rounded-xl border border-white/5 transition-all shadow-xl"><Icons.Code /></button>
                                                </div>

                                                <article className="markdown-content" dangerouslySetInnerHTML={{ __html: doc.content }} />

                                                {doc.backlinks?.length > 0 && (
                                                    <div className="mt-24 pt-12 border-t border-white/5">
                                                        <div className="flex items-center gap-2 text-[10px] text-slate-500 font-black uppercase tracking-[0.3em] mb-8">
                                                            <Icons.Link /> Referenced by
                                                        </div>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                            {doc.backlinks.map(b => (
                                                                <div key={b.path} onClick={() => selectDoc(b)} className="p-4 rounded-xl border border-white/5 bg-white/[0.02] hover:bg-blue-600/5 hover:border-blue-500/20 cursor-pointer transition-all group">
                                                                    <div className="text-sm font-bold text-slate-400 group-hover:text-white">{b.title}</div>
                                                                    <div className="text-[9px] text-slate-600 mt-1 uppercase font-black">{b.path}</div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ) : (
                                            <div className="h-full flex flex-col items-center justify-center opacity-10 grayscale">
                                                <Icons.Brain /><div className="mt-8 text-2xl font-black italic tracking-tighter">SELECT NODE</div>
                                            </div>
                                        )}
                                    </div>
                                    
                                    {/* TOC Sidebar */}
                                    {doc && (
                                        <div className="w-64 border-l border-white/5 p-8 flex flex-col gap-6 bg-black/10">
                                            <div className="text-[10px] font-black text-slate-600 uppercase tracking-widest">On this page</div>
                                            <div className="overflow-y-auto custom-scrollbar flex-1" dangerouslySetInnerHTML={{ __html: doc.toc }} />
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
